name: CI/CD – prevision-api

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    name: Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi \
            "uvicorn[standard]" \
            joblib \
            pandas \
            scikit-learn \
            imbalanced-learn \
            httpx \
            pytest

      - name: Executar testes
        run: |
          if [ -d tests ]; then
            pytest tests --tb=short -v
          else
            echo "Nenhum teste encontrado."
          fi

  deploy:
    name: Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preparar diretório da aplicação
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/prevision-api
            sudo chown -R ubuntu:ubuntu /opt/prevision-api

      - name: Copiar projeto
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/opt/prevision-api"
          overwrite: true

      - name: Atualizar ambiente
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/prevision-api

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            source .venv/bin/activate

            python -m pip install --upgrade pip

            pip install \
              fastapi \
              "uvicorn[standard]" \
              joblib \
              pandas \
              scikit-learn \
              imbalanced-learn

            sudo systemctl restart prevision-api

            sudo systemctl status prevision-api --no-pager
