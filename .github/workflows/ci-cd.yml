name: CI/CD – prevision-api

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Testes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install \
            fastapi \
            "uvicorn[standard]" \
            joblib \
            pandas \
            scikit-learn \
            imbalanced-learn \
            openmeteo-requests \
            requests-cache \
            httpx \
            pytest

      - name: Executar testes
        run: |
          if [ -d tests ]; then
            pytest tests/ --tb=short -v
          else
            echo "Nenhum diretório 'tests' encontrado – pulando etapa de testes."
          fi

  deploy:
    name: Deploy para EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Copiar arquivos para a EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "main.py,app.py,modelo.pkl,data/,service/,repository/"
          target: /opt/prevision-api

      - name: Criar ambiente, instalar dependências e reiniciar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_API_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /opt/prevision-api

            # Cria a virtualenv caso não exista
            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
            fi

            source .venv/bin/activate

            python -m pip install --upgrade pip

            pip install \
              fastapi \
              "uvicorn[standard]" \
              joblib \
              pandas \
              scikit-learn \
              imbalanced-learn

            sudo systemctl restart prevision-api

            sudo systemctl status prevision-api --no-pager
